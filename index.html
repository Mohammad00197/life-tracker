<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <title>Life</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="auth-screen">
    <div class="auth-inner">
      <div class="auth-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
      </div>
      <div class="auth-title">Life</div>
      <div class="auth-sub">Enter password to continue</div>
      <input type="password" id="auth-input" class="input" placeholder="Password" autocomplete="off">
      <div id="auth-error"></div>
      <button class="btn-primary" id="auth-btn">Unlock</button>
    </div>
  </div>

  <div id="profile-picker" style="display:none">
    <div class="picker-inner">
      <div class="picker-title">Who are you?</div>
      <div class="picker-sub">Pick your profile — you can switch anytime</div>
      <div class="picker-grid">
        <button class="picker-card" data-profile="mohammad">
          <div class="picker-avatar" style="background:linear-gradient(135deg,#007AFF,#5856D6)">M</div>
          <div class="picker-name">Mohammad</div>
        </button>
        <button class="picker-card" data-profile="karam">
          <div class="picker-avatar" style="background:linear-gradient(135deg,#FF2D55,#FF9500)">K</div>
          <div class="picker-name">Karam</div>
        </button>
      </div>
    </div>
  </div>

  <div id="app" style="display:none">
    <div id="page-today" class="page active"></div>
    <div id="page-habits" class="page"></div>
    <div id="page-stats" class="page"></div>

    <nav id="tab-bar">
      <button class="tab active" data-tab="today">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <circle cx="12" cy="12" r="4.5"/>
          <path d="M12 2.5v2.5M12 19v2.5M2.5 12H5M19 12h2.5M5.64 5.64l1.77 1.77M16.59 16.59l1.77 1.77M5.64 18.36l1.77-1.77M16.59 7.41l1.77-1.77"/>
        </svg>
        <span>Today</span>
      </button>
      <button class="tab" data-tab="habits">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9.5"/>
          <path d="M8 12.5l2.5 2.5 5.5-5.5"/>
        </svg>
        <span>Habits</span>
      </button>
      <button class="tab" data-tab="stats">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 20V10M12 20V4M6 20v-6"/>
        </svg>
        <span>Stats</span>
      </button>
    </nav>

    <div id="modal-overlay"></div>
    <div id="modal-sheet"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
