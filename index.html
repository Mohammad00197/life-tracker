<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <title>Life</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="lock-screen">
    <div class="lock-inner">
      <div class="lock-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
      </div>
      <div id="lock-title">Enter Passcode</div>
      <div id="pin-dots"><span></span><span></span><span></span><span></span></div>
      <div id="pin-error"></div>
      <div id="pin-pad">
        <button data-n="1">1</button><button data-n="2">2</button><button data-n="3">3</button>
        <button data-n="4">4</button><button data-n="5">5</button><button data-n="6">6</button>
        <button data-n="7">7</button><button data-n="8">8</button><button data-n="9">9</button>
        <button data-n="" class="pin-blank"></button><button data-n="0">0</button><button data-n="del" class="pin-del">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div id="app" style="display:none">
    <div id="page-today" class="page active"></div>
    <div id="page-habits" class="page"></div>
    <div id="page-money" class="page"></div>

    <nav id="tab-bar">
      <button class="tab active" data-tab="today">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <circle cx="12" cy="12" r="4.5"/>
          <path d="M12 2.5v2.5M12 19v2.5M2.5 12H5M19 12h2.5M5.64 5.64l1.77 1.77M16.59 16.59l1.77 1.77M5.64 18.36l1.77-1.77M16.59 7.41l1.77-1.77"/>
        </svg>
        <span>Today</span>
      </button>
      <button class="tab" data-tab="habits">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9.5"/>
          <path d="M8 12.5l2.5 2.5 5.5-5.5"/>
        </svg>
        <span>Habits</span>
      </button>
      <button class="tab" data-tab="money">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="5.5" width="20" height="13" rx="2.5"/>
          <path d="M2 10h20"/>
        </svg>
        <span>Money</span>
      </button>
    </nav>

    <div id="modal-overlay"></div>
    <div id="modal-sheet"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
